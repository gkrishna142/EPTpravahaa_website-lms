# Nginx config for React SPA (client-side routing)
# Use this so /contact, /enroll, /edupravahaa, etc. work on direct access and refresh

server {
    listen 80;
    server_name eptpravahaa.com www.eptpravahaa.com;
    root /path/to/your/Frontend/build;   # Update this to your actual build path
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # SPA fallback: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
